packages:
  - "packages/*"

allowBuilds:
  esbuild: true

# Match root .npmrc; ensures peer deps (e.g. hono, hono-openwhisk-adapter) install without listing every peer in each package.
autoInstallPeers: true

catalog:
  typescript: "^6.0.3"
  vite: "^8.0.14"
  vite-plugin-dts: "^5.0.1"
  vitest: "^4.1.7"
  "@vitest/coverage-v8": "^4.1.7"
  oxlint: "^1.67.0"
  oxfmt: "^0.52.0"
  oxlint-tsgolint: "^0.23.0"
  "@types/node": "^25.9.1"

minimumReleaseAgeExclude:
  - '@turbo/darwin-64@2.9.15'
  - '@turbo/darwin-arm64@2.9.15'
  - '@turbo/linux-64@2.9.15'
  - '@turbo/linux-arm64@2.9.15'
  - '@turbo/windows-64@2.9.15'
  - '@turbo/windows-arm64@2.9.15'
  - turbo@2.9.15
