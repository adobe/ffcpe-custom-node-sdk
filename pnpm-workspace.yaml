  vite: "^6.0.11"
  vite-plugin-dts: "^4.5.0"
  vitest: "^3.0.5"
  "@vitest/coverage-v8": "^3.0.5"
  oxlint: "^1.63.0"
  oxfmt: "^0.48.0"
  oxlint-tsgolint: "^0.22.1"
  "@types/node": "^22.0.0"
